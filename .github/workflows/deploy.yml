name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Uruchomi się przy każdym pushu do maina

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Folder, który powstaje po buildzie
          branch: gh-pages # Branch, na który automatycznie wypchnie stronę